name: ecommerce
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  intl: ^0.20.2
  supabase_flutter: ^2.12.2
  image_picker: ^1.2.1
  flutter_dotenv: ^6.0.0
  webview_flutter: ^4.10.0
  shared_preferences: ^2.5.5
  http: ^1.2.2
  pdf: ^3.11.1
  path_provider: ^2.1.2
  open_filex: ^4.7.0
  printing: ^5.13.2
  flutter_localizations:
    sdk: flutter
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: ^2.13.1
  fake_cloud_firestore: ^4.1.0+1
  firebase_auth_mocks: ^0.15.1
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - .env

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
